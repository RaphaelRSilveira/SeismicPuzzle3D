name: Deploy to GitHub Pages

on:
  # Aciona o deploy automaticamente ao fazer push na branch main ou master
  push:
    branches: ["main", "master"]
  # Permite rodar o workflow manualmente na aba "Actions" do GitHub
  workflow_dispatch:

# Define as permissões necessárias para o GITHUB_TOKEN fazer o deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que múltiplos deploys rodem ao mesmo tempo e causem conflitos
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job 1: Instala dependências e faz o Build (Gera a pasta dist)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Fazer o Build do projeto (Vite)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fazer upload do artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # O Vite gera os arquivos finais nesta pasta

  # Job 2: Pega a pasta dist e publica no GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
